# Alembic configuration for Atlas Backend.
#
# The actual database URL is supplied at runtime by alembic/env.py from
# ``Settings.database_sync_url`` (loaded from .env via pydantic-settings),
# which is why ``sqlalchemy.url`` here is intentionally blank. Hard-coding it
# would create a second source of truth that drifts from the application
# config; env.py overwrites whatever value lives in this file.

[alembic]
script_location = alembic
prepend_sys_path = ./src
version_path_separator = os
timezone = UTC

# Set by env.py from Settings.database_sync_url. Do not put a real URL here.
sqlalchemy.url =


[post_write_hooks]
# Empty: we don't run formatters on generated migrations because we hand-edit
# them and ruff already handles whole-repo formatting in CI.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
